<h3>Compound Inequalities</h3>
<p>When you see multiple conditions, you're combining solution sets. <b>AND</b> means both must be true (intersection) - like $2 < x < 5$. <b>OR</b> means at least one is true (union) - like $x < 2$ or $x > 5$.</p>
<div class="math-block">$$2 < x < 5 \\quad \\text{means both } x > 2 \\text{ and } x < 5$$</div>

<h3>Absolute Value as Distance</h3>
<p>Absolute value measures distance from zero. When you write $|x - 3| < 5$, you're asking: "What numbers are within 5 units of 3?" This "neighborhood" idea shows up everywhere in calculus (limits, continuity, epsilon-delta proofs).</p>

<p><b>Equations</b> split into two cases:</p>
<div class="math-block">$$|x - a| = b \\implies x = a + b \\text{ or } x = a - b$$</div>

<p><b>Inequalities</b> create bounded regions or split the number line:</p>
<div class="math-block">$$|x - a| < b \\implies a - b < x < a + b$$</div>
<div class="math-block">$$|x - a| > b \\implies x < a - b \\text{ or } x > a + b$$</div>

<p>The "less than" version keeps you close (inside the neighborhood). The "greater than" version pushes you away (outside the neighborhood).</p>

                    { id: "1.3", name: "Rational Expressions", content: `<h2>The LCD Strategy</h2><p>To add fractions like $\\frac{1}{x} + \\frac{1}{x+1}$, find the LCD: $x(x+1)$.</p><div class="math-block">$\\frac{x+1 + x}{x(x+1)} = \\frac{2x+1}{x^2+x}$</div>` },
                    { id: "1.4", name: "Exponent Rules", content: `<h2>Coming Soon</h2><p>Lesson content in development.</p>` },
                    { id: "1.5", name: "Polynomial Operations", content: `<h2>Coming Soon</h2><p>Lesson content in development.</p>` }
                ]
            }
        ];


        function renderTOC() {
            document.getElementById('toc-nav').innerHTML = curriculum.map(mod => `
                <div class="mb-4">
                    <h3 class="px-3 text-xs font-semibold text-slate-400 uppercase mb-2">${mod.title}</h3>
                    <div class="space-y-1">
                        ${mod.topics.map(t => `<button onclick="loadTopic('${mod.id}', '${t.id}')" id="btn-${t.id}" class="w-full text-left px-3 py-2 text-sm text-slate-600 rounded-md hover:bg-slate-100">${t.id}: ${t.name}</button>`).join('')}
                    </div>
                </div>`).join('');
        }

        function loadTopic(modId, topicId) {
            const mod = curriculum.find(m => m.id === modId);
            const topic = mod.topics.find(t => t.id === topicId);
            currentTopicName = topic.name;
            window.currentLesson = { module: mod.title || '', name: topic.name, content: topic.content };
            if (window.tutor) tutor.onLessonChange();
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('module-active', 'font-bold', 'text-blue-600'));
            document.getElementById(`btn-${topicId}`).classList.add('module-active', 'font-bold', 'text-blue-600');
            document.getElementById('content-area').innerHTML = `
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <div class="lesson-container">${topic.content}</div>
                    <div id="practice-zone" class="mt-8 border-t pt-8"></div>
                    <div id="quiz-zone" class="mt-8 border-t pt-8"></div>
                </div>`;
            MathJax.typeset();
            
            if (topic.practice && topic.practice.length > 0) {
                loadProblems(topic.practice);
            } else {
                document.getElementById('practice-zone').innerHTML = '<p class="italic text-slate-400">Practice problems coming soon...</p>';
            }
            
            if (topic.quiz && topic.quiz.length > 0) {
                loadQuiz(topic.quiz);
            } else {
                document.getElementById('quiz-zone').innerHTML = '<p class="italic text-slate-400">Quiz coming soon...</p>';
            }
        }

        // Quiz System
        let quizQuestions = [];
        let currentQuizIndex = 0;
        let quizAnswers = []; // Track: null (unanswered), true (correct), false (wrong)
        let quizScore = {correct: 0, wrong: 0};
        let quizAttempts = []; // Track attempts: {questionId, attempts, firstTryCorrect, skillArea}

        function loadQuiz(questions) {
            quizQuestions = questions;
            currentQuizIndex = 0;
            quizAnswers = new Array(questions.length).fill(null);
            quizScore = {correct: 0, wrong: 0};
            quizAttempts = questions.map(q => ({
                questionId: q.id,
                attempts: 0,
                firstTryCorrect: null,
                skillArea: q.skillArea || 'General'
            }));
            renderQuiz();
        }

        function renderQuiz() {
            const quizZone = document.getElementById('quiz-zone');
            const q = quizQuestions[currentQuizIndex];
            const answered = quizAnswers[currentQuizIndex];
            
            // Randomize choices
            const shuffledChoices = q.choices.map((choice, idx) => ({...choice, originalIdx: idx}));
            for (let i = shuffledChoices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledChoices[i], shuffledChoices[j]] = [shuffledChoices[j], shuffledChoices[i]];
            }
            
            const canGoPrev = currentQuizIndex > 0;
            const canGoNext = currentQuizIndex < quizQuestions.length - 1;
            const progressPercent = Math.round(((currentQuizIndex + 1) / quizQuestions.length) * 100);
            
            // If question was answered correctly, show locked state with green highlight
            const isCorrect = answered === true;
            
            quizZone.innerHTML = `
                <h3 class="text-xl font-bold text-purple-700 mb-6">📝 Quiz: Test Your Skills</h3>
                
                <div class="bg-purple-50 p-6 rounded-lg mb-4">
                    <p class="text-lg font-semibold mb-4">${q.question}</p>
                    <div class="space-y-2">
                        ${shuffledChoices.map((choice, idx) => {
                            const isThisCorrect = choice.correct;
                            const showAsCorrect = isCorrect && isThisCorrect;
                            return `
                            <button onclick="answerQuiz(${choice.originalIdx})" 
                                    class="w-full text-left p-4 border-2 rounded-lg transition-all ${
                                        showAsCorrect 
                                            ? 'bg-green-100 border-green-400 cursor-not-allowed' 
                                            : isCorrect 
                                                ? 'bg-white border-purple-200 opacity-50 cursor-not-allowed'
                                                : 'bg-white border-purple-200 hover:border-purple-400 hover:bg-purple-50'
                                    }">
                                <span class="font-bold text-purple-600">${String.fromCharCode(65 + idx)})</span> ${choice.text}
                                ${showAsCorrect ? ' ✓' : ''}
                            </button>
                        `}).join('')}
                    </div>
                </div>
                
                <div id="quiz-feedback" class="mb-4">
                    ${isCorrect ? '<div class="p-4 rounded-lg border-2 bg-green-100 border-green-400"><p class="font-semibold">✅ Correct! Already answered.</p></div>' : ''}
                </div>
                
                <div class="border-t-2 border-purple-200 pt-4">
                    <div class="flex items-center justify-between mb-2">
                        <button onclick="prevQuiz()" ${!canGoPrev ? 'disabled' : ''} 
                                class="px-4 py-2 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700 disabled:opacity-30 disabled:cursor-not-allowed">
                            ← Prev
                        </button>
                        
                        <div class="flex-1 mx-4">
                            <div class="bg-gray-200 rounded-full h-4 overflow-hidden">
                                <div class="bg-purple-600 h-4 transition-all duration-300" style="width: ${progressPercent}%"></div>
                            </div>
                            <p class="text-center text-sm font-semibold text-purple-700 mt-1">${currentQuizIndex + 1} / ${quizQuestions.length}</p>
                        </div>
                        
                        <button onclick="nextQuiz()" ${!canGoNext ? 'disabled' : ''} 
                                class="px-4 py-2 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700 disabled:opacity-30 disabled:cursor-not-allowed">
                            Next →
                        </button>
                    </div>
                    <p class="text-center text-sm text-slate-600 mb-3">
                        Score: <span class="text-green-600 font-bold">${quizScore.correct} correct</span>, 
                        <span class="text-red-600 font-bold">${quizScore.wrong} wrong</span>, 
                        <span class="text-gray-500">${quizAnswers.filter(a => a === null).length} unanswered</span>
                    </p>
                    <div class="text-center">
                        <button onclick="showQuizComplete()" 
                                class="px-8 py-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 shadow-lg">
                            📊 Submit Quiz
                        </button>
                    </div>
                </div>
            `;
            MathJax.typeset();
        }

        function answerQuiz(choiceIdx) {
            if (quizAnswers[currentQuizIndex] !== null) return; // Already answered correctly
            
            const q = quizQuestions[currentQuizIndex];
            const choice = q.choices[choiceIdx];
            
            // Track attempt
            quizAttempts[currentQuizIndex].attempts++;
            
            const feedbackDiv = document.getElementById('quiz-feedback');
            const isLastQuestion = currentQuizIndex >= quizQuestions.length - 1;
            
            if (choice.correct) {
                quizAnswers[currentQuizIndex] = true;
                quizScore.correct++;
                
                // Record if first try was correct
                if (quizAttempts[currentQuizIndex].attempts === 1) {
                    quizAttempts[currentQuizIndex].firstTryCorrect = true;
                }
                
                feedbackDiv.innerHTML = `
                    <div class="p-4 rounded-lg border-2 bg-green-100 border-green-400">
                        <p class="font-semibold">${choice.feedback}</p>
                    </div>
                `;
                
                // Update score display
                const scoreText = document.querySelector('#quiz-zone p.text-center');
                if (scoreText) {
                    scoreText.innerHTML = `
                        Score: <span class="text-green-600 font-bold">${quizScore.correct} correct</span>, 
                        <span class="text-red-600 font-bold">${quizScore.wrong} wrong</span>, 
                        <span class="text-gray-500">${quizAnswers.filter(a => a === null).length} unanswered</span>
                    `;
                }
            } else {
                // Record first try was wrong
                if (quizAttempts[currentQuizIndex].attempts === 1) {
                    quizAttempts[currentQuizIndex].firstTryCorrect = false;
                }
                
                // Wrong answer - show Try Again and Skip
                feedbackDiv.innerHTML = `
                    <div class="p-4 rounded-lg border-2 bg-red-100 border-red-400">
                        <p class="font-semibold mb-3">${choice.feedback}</p>
                        <div class="flex gap-3">
                            <button onclick="resetQuizQuestion()" class="px-4 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">
                                Try Again
                            </button>
                            ${!isLastQuestion ? 
                                '<button onclick="skipQuizQuestion()" class="px-4 py-2 bg-slate-600 text-white rounded-lg font-bold hover:bg-slate-700">Next →</button>' :
                                '<button onclick="skipQuizQuestion()" class="px-4 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">Finish</button>'
                            }
                        </div>
                    </div>
                `;
            }
            
            MathJax.typeset();
        }

        function resetQuizQuestion() {
            document.getElementById('quiz-feedback').innerHTML = '';
            renderQuiz();
        }

        function skipQuizQuestion() {
            // Mark as wrong and move on
            if (quizAnswers[currentQuizIndex] === null) {
                quizAnswers[currentQuizIndex] = false;
                quizScore.wrong++;
            }
            
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                // Can also submit from here
                showQuizComplete();
            }
        }

        function showQuizComplete() {
            const quizZone = document.getElementById('quiz-zone');
            
            // Calculate metrics
            const totalQuestions = quizQuestions.length;
            const answeredQuestions = quizAnswers.filter(a => a !== null).length;
            const unansweredCount = totalQuestions - answeredQuestions;
            const firstTryCorrect = quizAttempts.filter(a => a.firstTryCorrect === true).length;
            const firstTryPercentage = answeredQuestions > 0 ? Math.round((firstTryCorrect / answeredQuestions) * 100) : 0;
            const finalScore = quizScore.correct;
            const finalPercentage = Math.round((finalScore / totalQuestions) * 100);
            
            // Warning if incomplete
            let incompleteWarning = '';
            if (unansweredCount > 0) {
                incompleteWarning = `
                    <div class="bg-orange-100 border-2 border-orange-400 rounded-lg p-4 mb-4">
                        <p class="font-bold text-orange-800">⚠️ Incomplete Quiz</p>
                        <p class="text-sm text-orange-700">You have ${unansweredCount} unanswered question${unansweredCount > 1 ? 's' : ''}. Scores calculated from answered questions only.</p>
                    </div>
                `;
            }
            
            // Categorize weak areas
            const weakAreas = quizAttempts
                .filter(a => a.firstTryCorrect === false || a.attempts > 1)
                .map(a => a.skillArea);
            const uniqueWeakAreas = [...new Set(weakAreas)];
            
            // Determine recommendation
            let recommendation = '';
            let emoji = '';
            let nextStep = '';
            
            if (unansweredCount > 0) {
                emoji = '⚠️';
                recommendation = '<span class="text-orange-600 font-bold">INCOMPLETE</span>';
                nextStep = '<p class="text-lg mb-4">Complete all questions for accurate placement. Or retake for a fresh start.</p>';
            } else if (firstTryPercentage === 100) {
                emoji = '🏆';
                recommendation = '<span class="text-green-600 font-bold">PERFECT SCORE!</span>';
                nextStep = '<p class="text-lg mb-4">You crushed it! Skip to the <strong>next section\'s quiz</strong> - you don\'t need the practice problems.</p>';
            } else if (firstTryPercentage >= 70) {
                emoji = '🎯';
                recommendation = '<span class="text-blue-600 font-bold">SOLID PERFORMANCE</span>';
                nextStep = '<p class="text-lg mb-4">You\'re ready! Move on to the <strong>next lesson</strong>. Come back for practice if you want extra reps.</p>';
            } else {
                emoji = '📚';
                recommendation = '<span class="text-orange-600 font-bold">NEEDS PRACTICE</span>';
                nextStep = '<p class="text-lg mb-4">Work through the <strong>Practice Problems</strong> before moving on. Let\'s build that foundation!</p>';
            }
            
            // Build skill recap
            let skillRecap = '';
            if (uniqueWeakAreas.length > 0 && firstTryPercentage < 100) {
                skillRecap = `
                    <div class="bg-yellow-50 border-2 border-yellow-300 rounded-lg p-4 mb-6">
                        <h4 class="font-bold text-yellow-800 mb-2">📝 Skills Needing Review:</h4>
                        <ul class="list-disc list-inside space-y-1 text-yellow-900">
                            ${uniqueWeakAreas.map(skill => `<li>${skill}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            // Build attempt details
            let attemptDetails = '';
            if (firstTryPercentage < 100 && answeredQuestions > 0) {
                const multipleAttempts = quizAttempts.filter(a => a.attempts > 1);
                if (multipleAttempts.length > 0) {
                    attemptDetails = `
                        <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-4 mb-6">
                            <h4 class="font-bold text-blue-800 mb-2">🔄 Questions with Multiple Attempts:</h4>
                            <p class="text-sm text-blue-900">
                                ${multipleAttempts.length} question${multipleAttempts.length > 1 ? 's' : ''} required retries. 
                                Good persistence! Review those ${uniqueWeakAreas.join(', ')} concepts.
                            </p>
                        </div>
                    `;
                }
            }
            
            quizZone.innerHTML = `
                <div class="text-center py-6">
                    <p class="text-6xl mb-4">${emoji}</p>
                    <h3 class="text-3xl font-bold text-purple-600 mb-2">${recommendation}</h3>
                    <p class="text-lg text-slate-600 mb-6">Quiz Results</p>
                    
                    ${incompleteWarning}
                    
                    <div class="grid grid-cols-2 gap-4 mb-6 max-w-md mx-auto">
                        <div class="bg-gradient-to-br from-green-100 to-green-200 p-4 rounded-lg border-2 border-green-400">
                            <p class="text-sm text-green-800 font-semibold">First Try</p>
                            <p class="text-3xl font-bold text-green-700">${firstTryCorrect}/${answeredQuestions}</p>
                            <p class="text-sm text-green-600">${firstTryPercentage}%</p>
                        </div>
                        <div class="bg-gradient-to-br from-purple-100 to-purple-200 p-4 rounded-lg border-2 border-purple-400">
                            <p class="text-sm text-purple-800 font-semibold">Final Score</p>
                            <p class="text-3xl font-bold text-purple-700">${finalScore}/${totalQuestions}</p>
                            <p class="text-sm text-purple-600">${finalPercentage}%</p>
                        </div>
                    </div>
                    
                    ${skillRecap}
                    ${attemptDetails}
                    
                    <div class="bg-slate-100 border-2 border-slate-300 rounded-lg p-6 mb-6 text-left">
                        <h4 class="font-bold text-slate-800 mb-3 text-center">📋 What This Means:</h4>
                        ${nextStep}
                        ${firstTryPercentage < 70 && answeredQuestions > 0 ? `
                            <div class="bg-white rounded-lg p-4 border-l-4 border-orange-500">
                                <p class="font-semibold text-orange-800 mb-2">🎯 Quick Review Tips:</p>
                                <ul class="list-disc list-inside space-y-1 text-sm text-slate-700">
                                    ${uniqueWeakAreas.includes('Absolute Value Equations') ? '<li><strong>Absolute Value Equations:</strong> Split into two cases (+/-)</li>' : ''}
                                    ${uniqueWeakAreas.includes('Absolute Value Inequalities') ? '<li><strong>Absolute Value Inequalities:</strong> Less than = bounded interval, greater than = outside interval</li>' : ''}
                                    ${uniqueWeakAreas.includes('Compound Inequalities') ? '<li><strong>Compound Inequalities:</strong> Solve all parts together, keep inequality direction</li>' : ''}
                                    ${uniqueWeakAreas.includes('Rational Inequalities') ? '<li><strong>Rational Inequalities:</strong> Find zeros AND undefined points, test regions</li>' : ''}
                                    ${uniqueWeakAreas.includes('Polynomial Inequalities') ? '<li><strong>Polynomial Inequalities:</strong> Factor, find zeros, test sign in each region</li>' : ''}
                                    ${uniqueWeakAreas.includes('Word Problems') ? '<li><strong>Word Problems:</strong> Define variables, translate constraints into inequalities</li>' : ''}
                                    ${uniqueWeakAreas.includes('Advanced Mixed') ? '<li><strong>Mixed Problems:</strong> Break into cases, watch for undefined points, solve carefully</li>' : ''}
                                </ul>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="flex gap-4 justify-center">
                        <button onclick="loadQuiz(quizQuestions)" class="px-6 py-3 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700">
                            Retake Quiz
                        </button>
                    </div>
                </div>
            `;
        }

        function nextQuiz() {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            }
        }

        function prevQuiz() {
            if (currentQuizIndex > 0) {
                currentQuizIndex--;
                
                // If going back to wrong/unanswered question, reset it
                if (quizAnswers[currentQuizIndex] === false || quizAnswers[currentQuizIndex] === null) {
                    // Don't need to do anything special - renderQuiz will show fresh question
                }
                
                renderQuiz();
            }
        }

        let currentProblem = null;
        let currentStep = 0;
        let currentProblemIndex = 0;
        let allProblems = [];

        function renderPractice(problem) {
            currentProblem = problem;
            currentStep = 0;
            showStep();
        }

        function loadProblems(problems) {
            allProblems = problems;
            currentProblemIndex = 0;
            renderPractice(allProblems[0]);
        }

        function nextProblem() {
            currentProblemIndex++;
            if (currentProblemIndex >= allProblems.length) {
                document.getElementById('practice-zone').innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-3xl mb-4">🏆</p>
                        <h3 class="text-2xl font-bold text-green-600 mb-2">All Problems Complete!</h3>
                        <p class="text-slate-600 mb-4">You've mastered this lesson!</p>
                        <button onclick="loadProblems(allProblems)" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">Start Over</button>
                    </div>
                `;
            } else {
                renderPractice(allProblems[currentProblemIndex]);
            }
        }

        function prevProblem() {
            if (currentProblemIndex > 0) {
                currentProblemIndex--;
                renderPractice(allProblems[currentProblemIndex]);
            }
        }

        function skipToNext() {
            if (currentProblemIndex < allProblems.length - 1) {
                currentProblemIndex++;
                renderPractice(allProblems[currentProblemIndex]);
            }
        }

        function showStep() {
            const step = currentProblem.steps[currentStep];
            const practiceZone = document.getElementById('practice-zone');
            
            // Randomize choices
            const shuffledChoices = step.choices.map((choice, idx) => ({...choice, originalIdx: idx}));
            for (let i = shuffledChoices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledChoices[i], shuffledChoices[j]] = [shuffledChoices[j], shuffledChoices[i]];
            }
            
            const canGoPrev = currentProblemIndex > 0;
            const canGoNext = currentProblemIndex < allProblems.length - 1;
            
            let html = `
                <h3 class="text-xl font-bold text-slate-700 mb-4">🎯 Practice Problem</h3>
                <div class="bg-blue-50 p-4 rounded-lg mb-4">
                    <p class="font-bold text-lg">Problem: ${currentProblem.problem}</p>
                </div>
                <div class="bg-slate-50 p-6 rounded-lg mb-4">
                    <p class="text-2xl font-bold mb-2">${step.display}</p>
                    ${step.workShown ? `<p class="text-sm text-slate-600 italic mt-2">${step.workShown}</p>` : ''}
                </div>
                <p class="font-semibold mb-3">${step.question}</p>
                <div class="space-y-2" id="choices-container">
                    ${shuffledChoices.map((choice, idx) => `
                        <button onclick="handleChoice(${choice.originalIdx})" class="w-full text-left p-4 bg-white border-2 border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition-all">
                            <span class="font-bold text-blue-600">${String.fromCharCode(65 + idx)})</span> ${choice.text}
                        </button>
                    `).join('')}
                </div>
                <div id="feedback" class="mt-4"></div>
                <div class="mt-4 flex items-center justify-center gap-4">
                    <button onclick="prevProblem()" ${!canGoPrev ? 'disabled' : ''} class="px-4 py-2 bg-slate-600 text-white rounded-lg font-bold hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed">← Prev</button>
                    <span class="text-sm text-slate-600 font-semibold">Problem ${currentProblemIndex + 1} of ${allProblems.length}</span>
                    <button onclick="skipToNext()" ${!canGoNext ? 'disabled' : ''} class="px-4 py-2 bg-slate-600 text-white rounded-lg font-bold hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed">Next →</button>
                </div>
            `;
            
            practiceZone.innerHTML = html;
            MathJax.typeset();
        }

        function handleChoice(choiceIdx) {
            const step = currentProblem.steps[currentStep];
            const choice = step.choices[choiceIdx];
            const feedbackDiv = document.getElementById('feedback');
            
            feedbackDiv.innerHTML = `
                <div class="p-4 rounded-lg ${choice.correct ? 'bg-green-100 border-2 border-green-400' : 'bg-yellow-100 border-2 border-yellow-400'}">
                    <p class="font-semibold">${choice.feedback}</p>
                    ${choice.correct ? '<button onclick="nextStep()" class="mt-3 px-4 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">Continue →</button>' : '<button onclick="showStep()" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">Try Again</button>'}
                </div>
            `;
            MathJax.typeset();
        }

        function nextStep() {
            currentStep++;
            if (currentStep >= currentProblem.steps.length) {
                const isLastProblem = currentProblemIndex >= allProblems.length - 1;
                document.getElementById('practice-zone').innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-3xl mb-4">🎉</p>
                        <h3 class="text-2xl font-bold text-green-600 mb-2">Problem Complete!</h3>
                        <p class="text-slate-600 mb-2">Great work!</p>
                        <p class="text-sm text-slate-500 mb-4">Problem ${currentProblemIndex + 1} of ${allProblems.length}</p>
                        <div class="flex gap-3 justify-center">
                            <button onclick="renderPractice(currentProblem)" class="px-6 py-2 bg-slate-600 text-white rounded-lg font-bold hover:bg-slate-700">↺ Try Again</button>
                            ${!isLastProblem ? '<button onclick="nextProblem()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">Next Problem →</button>' : '<button onclick="nextProblem()" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">Finish! 🏆</button>'}
                        </div>
                    </div>
                `;
                MathJax.typeset();
            } else {
                showStep();
            }
        }

        window.onload = renderTOC;
    </script>
    <script src="tutor.js"></script>
</body>
</html>
